name: dompetin
description: Dompetin - Personal Finance Manager App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.1.0
  shared_preferences: ^2.2.2
  camera: ^0.10.5+9
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0
  intl: ^0.19.0
  http: ^1.6.0
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
